[flake8]
# Match black's line length so the two tools don't conflict.
max-line-length = 100

# E203: whitespace before ':' — black disagrees with flake8 here
# W503: line break before binary operator — superseded by W504, black prefers this style
extend-ignore = E203, W503

# Don't lint auto-generated files
exclude =
    src/lammps_mdi/_version.py,
    .git,
    __pycache__,
    build,
    dist,
    .eggs,
